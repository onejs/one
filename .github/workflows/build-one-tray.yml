name: Build OneTray

on:
  push:
    tags:
      - 'one-tray-v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-14
    permissions:
      contents: write # create release + upload assets
    steps:
      - uses: actions/checkout@v6

      - name: Build release
        run: |
          cd apps/one-tray
          make release

      - name: Package app
        run: |
          cd apps/one-tray
          zip -r OneTray.zip OneTray.app

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: OneTray
          path: apps/one-tray/OneTray.zip

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: apps/one-tray/OneTray.zip
